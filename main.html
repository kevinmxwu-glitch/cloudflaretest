<!DOCTYPE html>
<html lang="zh-TW">

<head>

  <div class="layout">

        <div class="demo-box" id="shop">區塊1</div>
        <div class="demo-box">區塊2</div>
        <div class="demo-box">區塊3</div>
        <div class="demo-box">區塊1</div>
        <div class="demo-box">區塊2</div>
        <div class="demo-box">區塊3</div>
      </main>

    </div>

    <!-- 底部 -->
    <footer class="footer">
      <!-- 底部footer（只有最外面有 其他頁面自主刪除） -->
      <img src="image/main/nma_logo.png"> 
      <img src="image/main/nma_logo.png"> 
      <img src="image/main/nma_logo.png"> 
      <img src="image/main/nma_logo.png"> 
      <img src="image/main/nma_logo.png">
