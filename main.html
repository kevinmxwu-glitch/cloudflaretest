<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>網站架構</title>
  <link rel="stylesheet" href="Google Sheet.css">
</head>

<body>

  <!-- 左上角 icon -->
  <div class="menu-icon">
    <img src="image/main/menu_icon.png" alt="menu">
  </div>
  <!-- 遮罩 -->
  <div class="overlay"></div>

  <!-- 側邊選單 -->
  <nav class="side-menu">
    <ul>
      <li><a href="#exhibit">展覽介紹</a></li>
      <li><a href="#event">活動資訊</a></li>
      <li><a href="#works">作品介紹</a></li>
      <li><a href="#about">關於我們</a></li>
      <li><a href="#shop">周邊商品</a></li>
      <li><a href="#visit">參觀資訊</a></li>
    </ul>
  </nav>
  <div class="layout">
    <section class="upDownGroup">

      <!-- 👇 展覽（底層） -->
      <div class="upDownBg">
        <div class="page" id="visit">
          <div class="video-bg">
            <video class="video-desktop" autoplay muted loop playsinline>
              <source src="video/main/visit_loop_desktop.mp4">
            </video>

            <video class="video-mobile" autoplay muted loop playsinline>
              <source src="video/main/visit_loop_mobile.mp4">
            </video>
          </div>
          <header class="header"></header>
          <main class="main">

  <div class="visit-layout">

  <!-- 標題 -->
  <div class="visit-title">
    <h1>參觀資訊</h1>
  </div>

  <!-- PDF -->
  <div class="visit-right">
    <div class="pdf-box">
      <iframe src="pdf/main/myPDF.pdf#toolbar=0&navpanes=0"></iframe>
    </div>
  </div>

  <!-- 按鈕 -->
  <div class="button-group">
    <button class="arrow-btn">
      參觀手冊下載
    </button>
    <button class="arrow-btn">
      場地與交通資訊<img src="image/main/Arrow 1.svg">
    </button>
    
  </div>

</div>

</main>
          <!-- 底部 -->
          <footer class="footer">
            <!-- 底部footer（只有最外面有 其他頁面自主刪除） -->
            <img src="image/main/nma_logo.png">
            <img src="image/main/nma_logo.png">
            <img src="image/main/nma_logo.png">
            <img src="image/main/nma_logo.png">
            <img src="image/main/nma_logo.png">
            <img src="image/main/nma_logo.png">
          </footer>

        </div>
      </div>

      <!-- 👇 商品（上層） -->
      <div class="upDownContent">
        <div class="upDownPanel">
          <div class="page" id="shop">

  <img class="shop-bg" src="image/main/shopBg.svg" alt="">
            <header class="header">商品 Header</header>
            <main class="main">
              <div class="demo-box">商品1</div>
              <div class="demo-box">商品2</div>
              <div class="demo-box">商品3</div>
            </main>
          </div>
        </div>
      </div>

    </section>



  </div>
  <script src="main.js"></script>
</body>

</html>
