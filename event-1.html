<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>《在那出現之前 Before Zero》模組合成器工作坊</title>

  <style>
    :root {
      --text: #101010;
      --muted: #2b2b2b;
      --subtle: #575757;
      --button: #e45733;
      --button-hover: #ef6b49;
      --card: rgba(245, 245, 245, 0.92);
      --line: rgba(0,0,0,.12);
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      font-family: "Noto Sans TC", sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(0,0,0,.08), rgba(0,0,0,.18)),
        url('image/scrolling1/bg_gray.webp') center / cover no-repeat fixed;
    }

    .page {
      width: min(100%, 980px);
      margin: 0 auto;
      padding: 22px 18px 48px;
    }

    .panel {
      background: var(--card);
      padding: 18px 18px 28px;
      box-shadow: 0 12px 38px rgba(0,0,0,.18);
    }

    .top-icon {
      display: inline-block;
      width: 42px;
      margin-bottom: 14px;
    }

    .top-icon img {
      width: 100%;
      filter: invert(1);
    }

    .title {
      font-size: clamp(28px, 4.8vw, 54px);
      font-weight: 900;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    /* ✅ FIXED HERO */
    .hero {
      width: 100%;
      aspect-ratio: 1.48 / 1;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      font-size: 16px;
      line-height: 1.7;
    }

    .desc {
      margin-bottom: 18px;
    }

    .meta-item {
      margin-bottom: 6px;
      color: var(--subtle);
    }

    .meta-item strong {
      color: #000;
    }

    .button {
      display: inline-flex;
      padding: 12px 28px;
      border-radius: 999px;
      background: var(--button);
      color: #fff;
      text-decoration: none;
      font-weight: 800;
      margin-top: 12px;
    }

    .button:hover {
      background: var(--button-hover);
    }

    .pager {
      display: flex;
      justify-content: space-between;
      margin-top: 30px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .pager-link {
      text-decoration: none;
      color: #000;
      font-weight: 700;
    }

    .dots {
      display: flex;
      gap: 10px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: rgba(0,0,0,.2);
    }

    .dot.active {
      width: 26px;
      background: #000;
    }
    .bz-link-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 10px;

  min-width: 200px;
  height: 50px;
  padding: 0 24px;

  background: #E83928;
  color: #fff;
  font-size: 14px;
  font-weight: 400;
  text-decoration: none;

  border: none;
  border-radius: 46px;
  cursor: pointer;
  transition: 0.3s;
}

.bz-link-btn:hover {
  background: #c92f20;
}

.bz-link-btn .bz-link-arrow {
  width: 18px;
  height: 18px;
  display: inline-block;
  flex-shrink: 0;
  transition: transform 0.3s;
}

.bz-link-btn:hover .bz-link-arrow {
  transform: translateX(6px);
}
  </style>
</head>

<body>

  <main class="page">
    <section class="panel">

      <!-- back to index -->
      <a class="top-icon" href="index.html">

      </a>

      <h1 class="title">
        《在那出現之前 Before Zero》模組合成器工作坊《在數位出現之前》

      <!-- ✅ REAL IMAGE -->
      <div class="hero">
        <img src="https://raw.githubusercontent.com/Koogeocimo/beforezerosource/main/01_image/rebuild_01/workshop.webp">
      </div>

      <section class="content">

        <p class="desc">
          在本次工作坊中，將分享電子音樂聲音設計的核心邏輯，
          帶領大家從 Korg Minilogue xd 解析經典合成器構造，
          接著利用 VCV Rack 軟體進行虛擬重構實戰，
          最後再進階到實體模組合成器與 Torso S4 採樣機的現場操作與創作探討。
        </p>

        <p class="meta-item"><strong>時間:</strong> 5/11（一）16:00–18:30</p>
        <p class="meta-item"><strong>地點:</strong> 北藝大 研究大樓 R214</p>
        <p class="meta-item"><strong>參加方法:</strong> 免費，網路預約</p>

        <a class="bz-link-btn"
           href="https://forms.gle/TFqeLxQnVyKjomHE7"
           target="_blank">
          報名連結
          <img class="bz-link-arrow" src="image/main/Arrow 1.svg" alt="">
        </a>

        <!-- navigation -->
        <div class="pager">
          <a class="pager-link" href="event-3.html">PREV</a>

          <div class="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
            <div class="dot"></div>
          </div>

          <a class="pager-link" href="event-2.html">NEXT</a>
        </div>

      </section>
    </section>
  </main>

</body>
</html>
